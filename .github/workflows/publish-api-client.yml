# Publish @mix-space-lts/api-client to npm using Trusted Publishing (OIDC)
# No NPM_TOKEN needed — relies on GitHub ↔ npm OIDC trust.
#
# Before first publish:
#   1. Create npm org:  https://www.npmjs.com/org/create  (pick "mix-space-lts")
#   2. Add Trusted Publisher on each package's npm settings page:
#      https://www.npmjs.com/package/@mix-space-lts/api-client/access
#      → "Require two-factor authentication or automation tokens" → "Add Trusted Publisher"
#      → Owner: mix-space-lts  |  Repo: core  |  Workflow: publish-api-client.yml

name: Publish @mix-space-lts/api-client

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.5.0). Leave empty to publish current package.json version.'
        required: false
        default: ''
  push:
    branches: [master, main]
    paths:
      - 'packages/api-client/package.json'

permissions:
  id-token: write   # required for npm provenance / OIDC
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api-client
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@e94b270858c939f4f8b43f5c1438fa1d9a67ad5d
        with:
          run_install: true

      - name: Bump version (if provided)
        if: ${{ github.event.inputs.version != '' }}
        run: |
          pnpm version "${{ github.event.inputs.version }}" --no-git-tag-version || true

      - name: Build
        run: pnpm run package

      # Ensure npm 11.5.1 or later for trusted publishing
      - run: npm install -g npm@latest

      - name: Publish to npm (Trusted Publishing)
        run: |
          npm publish --provenance --access public
